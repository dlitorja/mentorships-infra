name: Deploy Convex

on:
  push:
    branches:
      - main
    paths:
      - 'convex/**'
      - '!convex/_generated/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      CONVEX_DEPLOYMENT: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install deps (allow convex codegen in postinstall)
        run: pnpm install
      - name: Deploy Convex
        run: pnpm exec convex deploy --yes
