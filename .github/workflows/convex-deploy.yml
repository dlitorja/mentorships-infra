name: Deploy Convex

on:
  push:
    branches:
      - main
    paths:
      - 'convex/**'
      - '!convex/_generated/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - name: Deploy Convex
        env:
          # Use a Production Deploy Key to authenticate non-interactively
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          # Optional: explicitly target a deployment if needed
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
        run: pnpm exec convex deploy --yes
