name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      vercel_project:
        description: 'Vercel project name (e.g., mentorships-infra-web-ril3)'
        required: true
        default: 'mentorships-infra-web-ril3'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ env.VERCEL_TOKEN }} --project=${{ github.event.inputs.vercel_project }}
