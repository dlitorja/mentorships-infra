name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target: web or marketing'
        required: true
        default: 'web'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          TARGET="${{ github.event.inputs.target }}"
          echo "Target: $TARGET"
          
          if [ "$TARGET" = "web" ]; then
            echo "project=mentorships-infra-web-ril3" >> $GITHUB_OUTPUT
          else
            echo "project=mentorships-infra-web" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ env.VERCEL_TOKEN }} --project-name=${{ steps.changes.outputs.project }}
